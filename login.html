<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo – Terreiro</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/cadastro.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4f0 0%, #e8f5e9 100%);
    }
    .login-box {
      background: white;
      padding: 44px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 400px;
      border-top: 4px solid #00801c;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 {
      font-size: 18px;
      color: #00801c;
      font-weight: 700;
    }
    .login-logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .login-box label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      margin-top: 14px;
      margin-bottom: 4px;
    }
    .login-box input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    .login-box input:focus {
      border-color: #00801c;
      background: white;
      box-shadow: 0 0 0 3px rgba(0,128,28,0.08);
    }
    .login-box button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: #00801c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,128,28,0.20);
    }
    .login-box button:hover {
      background: #006b17;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,128,28,0.30);
    }
    #msgLogin {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: #c62828;
      font-weight: 500;
      min-height: 20px;
    }
    .link-voltar {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    .link-voltar:hover {
      color: #00801c;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <h1>Terreiro de Umbanda</h1>
        <p>Acesso restrito à área administrativa</p>
      </div>

      <form id="formLogin">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" required placeholder="admin@terreiro.com" autocomplete="email">

        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" required placeholder="••••••" autocomplete="current-password">

        <button type="submit">Entrar</button>
      </form>

      <p id="msgLogin"></p>

      <a href="index.html" class="link-voltar">← Voltar ao site</a>
    </div>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
